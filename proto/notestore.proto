syntax = "proto2";

package icloudnotessync.notestore;

// Apple Notes' protobuf wire format, as used by the CloudKit web APIs this
// project talks to (`TextDataEncrypted` on a Note record,
// `MergeableDataEncrypted` on a table's Attachment record - both share this
// same schema family once decompressed).
//
// Base: the schema reverse-engineered from real captures and independently
// cross-checked against the *compiled* `FileDescriptorProto` extracted from
// threeplanetssoftware/apple_cloud_notes_parser's `lib/notestore_pb.rb` (MIT
// licensed) - see this project's Obsidian dev notes, "Additional
// Investigation::Adopt `apple_cloud_notes_parser`'s real `.proto` schema...".
// That source only covers the `Note`/`AttributeRun`/CRDT-tree messages (it
// works from an on-device SQLite backup, which never needs the live-sync
// CRDT text history); `TextRun`/`Coord`/`ReplicaEntry`/`ReplicaTable` below,
// and the two `unknown_field_1`s, are this project's own reverse-engineering
// of the live CloudKit wire format, verified against real captures - see
// noteDocument.ts's original docstring and the "push implemented" dev notes
// (2026-07-13).
//
// proto2 throughout: explicit field presence (`isSet()`), matching the
// `required`/`optional` grammar this schema was derived with, and this
// project's existing "zero values are encoded explicitly" requirement for
// the byte-exact round-trip gate `push.ts` depends on.
//
// Fields whose *contents* are still unknown are deliberately left
// undeclared, not modeled - protobuf-es retains and re-emits genuinely
// unknown fields on its own (`readUnknownFields`/`writeUnknownFields`),
// which keeps their position correct without pretending to understand them.
// The one exception is `MergeableDataObjectEntry.unknown_message` (field 9):
// declared `bytes` rather than left undeclared, since as a *submessage* an
// undeclared field-9 occurrence could plausibly be misread as some other
// known field's continuation - `bytes` guarantees it's treated as one opaque
// blob no matter its internal shape.

// --- Plain note body (Note.text_run/replica_table are this project's own
// --- extension - see file header) --------------------------------------

message NoteStoreProto {
  // Observed as 0 in every capture so far; preserved verbatim, never
  // interpreted. Field number confirmed empirically - not part of the
  // apple_cloud_notes_parser cross-check (that schema jumps straight to
  // field 2).
  optional uint32 unknown_field_1 = 1;
  required Document document = 2;
}

message Document {
  // As with NoteStoreProto's field 1: observed present, meaning unknown,
  // preserved verbatim. Only field 2 (version) is part of the cross-checked
  // schema.
  optional uint32 unknown_field_1 = 1;
  required int32 version = 2;
  required Note note = 3;
}

message Note {
  required string note_text = 2;
  // This project's own addition (see file header): the CRDT edit history
  // behind note_text - present on the top-level document's Note, absent
  // (harmlessly, proto2 optional) when this message shape is reused for
  // table-cell text or ordered-set contents elsewhere in this file.
  repeated TextRun text_run = 3;
  optional ReplicaTable replica_table = 4;
  repeated AttributeRun attribute_run = 5;
}

message Coord {
  required uint32 replica = 1;
  required uint32 clock = 2;
}

message TextRun {
  required Coord coord = 1;
  required uint32 length = 2;
  // Anchor semantics still not fully understood; preserved verbatim either way.
  required Coord anchor = 3;
  // Only ever observed as literal 1 when present.
  optional uint32 tombstone = 4;
  // Discovered via a real 2026-07-15 capture (dev notes, same date) to
  // occasionally appear *twice* in one TextRun - genuinely `repeated`, not
  // `optional`, despite every other capture so far having at most one. A
  // proto2 `optional` field here would silently drop every occurrence but
  // the last on decode, exactly the bug found in this project's pre-migration
  // hand-rolled codec. Whether the CRDT gives multiple sequence numbers real
  // meaning, or this is two unrelated writes that happened to reuse the
  // field number, is unknown - preserved in original order either way.
  repeated uint32 sequence = 5;
}

message ReplicaCounter {
  required uint32 value = 1;
}

message ReplicaEntry {
  required bytes uuid = 1;
  // First entry is the replica's text clock (total UTF-16 units it has
  // inserted); later entries' meanings are unknown and preserved verbatim.
  repeated ReplicaCounter counter = 2;
}

message ReplicaTable {
  repeated ReplicaEntry entry = 1;
}

// --- Formatting (cross-checked against apple_cloud_notes_parser) -------

message Color {
  required float red = 1;
  required float green = 2;
  required float blue = 3;
  required float alpha = 4;
}

message AttachmentInfo {
  optional string attachment_identifier = 1;
  optional string type_uti = 2;
}

message Font {
  optional string font_name = 1;
  optional float point_size = 2;
  optional int32 font_hints = 3;
}

message Checklist {
  required bytes uuid = 1;
  required int32 done = 2;
}

message ParagraphStyle {
  optional int32 style_type = 1;
  optional int32 alignment = 2;
  // Not part of the cross-checked schema; found via the Step 1 round-trip
  // spike, 2026-07-15, on a real checklist-item paragraph style (alongside
  // `checklist` below). Declaring it (rather than leaving it undeclared and
  // relying on protobuf-es's unknown-field retention) matters here
  // specifically: an *undeclared* field gets bucketed as "unknown" and
  // re-emitted after every *declared* field regardless of its original
  // position, which silently reordered field 3 to after field 5 on
  // re-encode - a real round-trip break protobuf-es's own sorted-encode
  // behavior can produce whenever the schema has an undocumented gap in the
  // *middle* of a message, not just at reordering `push.ts`'s docs
  // anticipated (out-of-ascending-order source data). Meaning still
  // unknown; wire type (varint) is what real data shows.
  optional int32 unknown_field_3 = 3;
  optional int32 indent_amount = 4;
  optional Checklist checklist = 5;
  optional int32 block_quote = 8;
  // Same reasoning as field 3 above - an opaque, not-understood
  // length-delimited value (looks like another 16-byte UUID) seen
  // immediately after `checklist` on the same real capture.
  optional bytes unknown_field_9 = 9;
}

message AttributeRun {
  required int32 length = 1;
  optional ParagraphStyle paragraph_style = 2;
  optional Font font = 3;
  optional int32 font_weight = 5;
  optional int32 underlined = 6;
  optional int32 strikethrough = 7;
  optional int32 superscript = 8;
  optional string link = 9;
  optional Color color = 10;
  optional AttachmentInfo attachment_info = 12;
  optional int32 unknown_identifier = 13;
  optional int32 emphasis_style = 14;
}

// --- CRDT tree (MergeableDataEncrypted; tables today, cross-checked
// --- against apple_cloud_notes_parser) ----------------------------------

message ObjectID {
  // A union of ref shapes, not three simultaneous values: verified via the
  // Step 1 round-trip spike, 2026-07-15 - real captured `ObjectID`s each
  // set exactly one of these three (a pool ref via `object_index`, an
  // inline number via `unsigned_integer_value`, or an inline string via
  // `string_value`), matching how `decodeTableRecord.ts` already reads them
  // (`resolveRef` vs `resolveNumber` never expect more than one to be
  // present). The known schema's `required` on all three doesn't survive
  // contact with real data.
  optional uint64 unsigned_integer_value = 2;
  optional string string_value = 4;
  optional int32 object_index = 6;
}

message DictionaryElement {
  required ObjectID key = 1;
  required ObjectID value = 2;
}

message Dictionary {
  repeated DictionaryElement element = 1;
}

message RegisterLatest {
  // Not part of the cross-checked schema; found via the Step 1 round-trip
  // spike, 2026-07-15 - an unidentified value (looks internally like
  // another ObjectID-shaped pair, but kept opaque rather than typed; see
  // file header) preceding `contents` on real captured pool entries.
  optional bytes unknown_field_1 = 1;
  required ObjectID contents = 2;
}

message MapEntry {
  required int32 key = 1;
  required ObjectID value = 2;
}

message MergeableDataObjectMap {
  required int32 type = 1;
  repeated MapEntry map_entry = 3;
}

message OrderedSetOrderingArrayAttachment {
  required int32 index = 1;
  required bytes uuid = 2;
}

message OrderedSetOrderingArray {
  required Note contents = 1;
  repeated OrderedSetOrderingArrayAttachment attachment = 2;
}

message OrderedSetOrdering {
  required OrderedSetOrderingArray array = 1;
  required Dictionary contents = 2;
}

message OrderedSet {
  required OrderedSetOrdering ordering = 1;
  required Dictionary elements = 2;
}

message ListEntryDetailsKey {
  required int32 list_entry_details_type_index = 1;
  required int32 list_entry_details_key = 2;
}

message ListEntryDetails {
  optional ListEntryDetailsKey list_entry_details_key = 1;
  optional ObjectID id = 2;
}

message ListEntry {
  required ObjectID id = 2;
  optional ListEntryDetails details = 3;
  required ListEntryDetails additional_details = 4;
}

message List {
  repeated ListEntry list_entry = 1;
}

message MergeableDataObjectEntry {
  // The known schema (cross-checked against apple_cloud_notes_parser)
  // declares this required, but real captured tables round-trip with pool
  // entries that never set it at all (this project's own union-of-payload-
  // shapes reading of MergeableDataObjectEntry - only one of
  // register_latest/list/dictionary/unknown_message/note/custom_map/
  // ordered_set is actually present per entry) - verified via the Step 1
  // round-trip spike, 2026-07-15.
  optional RegisterLatest register_latest = 1;
  optional List list = 5;
  optional Dictionary dictionary = 6;
  // Explicitly-unknown catch-all - even apple_cloud_notes_parser hasn't
  // named this one. Left as opaque bytes deliberately; see file header.
  optional bytes unknown_message = 9;
  optional Note note = 10;
  optional MergeableDataObjectMap custom_map = 13;
  optional OrderedSet ordered_set = 16;
}

message MergeableDataObjectData {
  // Not part of the cross-checked schema; found via the Step 1 round-trip
  // spike, 2026-07-15, on the real table fixtures - an unidentified
  // 8-byte submessage (three small varints) preceding the entry list.
  // `repeated`, not `optional`: cardinality unverified, and `repeated` is
  // the safe default whenever that's true (see TextRun.sequence above -
  // `optional` silently drops every occurrence but the last on decode).
  // Declared as opaque bytes since its internal shape isn't understood;
  // see file header.
  repeated bytes unknown_field_1 = 1;
  repeated MergeableDataObjectEntry mergeable_data_object_entry = 3;
  repeated string mergeable_data_object_key_item = 4;
  repeated string mergeable_data_object_type_item = 5;
  repeated bytes mergeable_data_object_uuid_item = 6;
}

message MergableDataObject {
  // Same "always observed 0, unknown meaning" pattern as NoteStoreProto's
  // and Document's own field 1 - found via the Step 1 round-trip spike,
  // 2026-07-15, on the table fixtures. This wrapper shape (an unknown
  // varint at field 1 preceding the real payload) turns out to repeat at
  // every nesting level of this root-wrapper family, not just the
  // outermost one.
  optional uint32 unknown_field_1 = 1;
  required int32 version = 2;
  required MergeableDataObjectData mergeable_data_object_data = 3;
}

message MergableDataProto {
  // Same pattern again, one level up - see MergableDataObject.unknown_field_1.
  optional uint32 unknown_field_1 = 1;
  required MergableDataObject mergable_data_object = 2;
}
